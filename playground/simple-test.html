<!DOCTYPE html>
<html>
<head>
    <title>Simple DeForm Test</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>Simple DeForm Test</h1>
    <div id="status">Loading...</div>
    
    <script type="module">
        const statusDiv = document.getElementById('status');
        
        try {
            // Test importing the library
            await import('../src/index.js');
            statusDiv.innerHTML = "✅ Library imported successfully!";
            console.log("Library imported successfully");
            
            // Test if the custom element is defined
            if (customElements.get('de-form')) {
                statusDiv.innerHTML += "<br>✅ Custom element registered!";
                console.log("Custom element registered");
            } else {
                statusDiv.innerHTML += "<br>❌ Custom element not registered";
                console.error("Custom element not registered");
            }
            
        } catch (error) {
            statusDiv.innerHTML = "❌ Import failed: " + error.message;
            console.error("Import failed:", error);
        }
    </script>
</body>
</html>
