<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DeForm Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        #console { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>DeForm Debug Test</h1>
    
    <div id="status" class="status info">Loading...</div>
    
    <div id="console"></div>
    
    <div id="form-container"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const consoleDiv = document.getElementById('console');
        const formContainer = document.getElementById('form-container');
        
        // Capture console output
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToConsole(type, ...args) {
            const timestamp = new Date().toLocaleTimeString();
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            consoleDiv.textContent += `[${timestamp}] ${type.toUpperCase()}: ${message}\n`;
        }
        
        console.log = (...args) => {
            originalLog.apply(console, args);
            addToConsole('log', ...args);
        };
        
        console.error = (...args) => {
            originalError.apply(console, args);
            addToConsole('error', ...args);
        };
        
        console.warn = (...args) => {
            originalWarn.apply(console, args);
            addToConsole('warn', ...args);
        };
        
        // Test the library
        try {
            // Import the library
            import('../src/index.js')
                .then(() => {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Library imported successfully!';
                    
                    // Check if custom element is registered
                    if (customElements.get('de-form')) {
                        statusDiv.textContent += ' ✅ Custom element registered!';
                        
                        // Test creating a simple form
                        const testForm = document.createElement('de-form');
                        testForm.setAttribute('fields', JSON.stringify({
                            sections: [{
                                name: 'test',
                                fields: [{
                                    name: 'testField',
                                    type: 'text-string',
                                    label: 'Test Field'
                                }]
                            }]
                        }));
                        
                        formContainer.appendChild(testForm);
                        statusDiv.textContent += ' ✅ Form created successfully!';
                        
                    } else {
                        statusDiv.className = 'status error';
                        statusDiv.textContent += ' ❌ Custom element not registered';
                    }
                })
                .catch(error => {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ Import failed: ' + error.message;
                    console.error('Import failed:', error);
                });
                
        } catch (error) {
            statusDiv.className = 'status error';
            statusDiv.textContent = '❌ Script error: ' + error.message;
            console.error('Script error:', error);
        }
        
        // Monitor for runtime errors
        window.addEventListener('error', (event) => {
            addToConsole('runtime-error', `${event.message} at ${event.filename}:${event.lineno}`);
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            addToConsole('unhandled-rejection', event.reason);
        });
    </script>
</body>
</html>
