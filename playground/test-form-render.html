<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DeForm Render Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        #console { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .form-container { border: 2px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 5px; }
        .form-container:empty::before { content: "Form container is empty - DeForm not rendering"; color: #999; font-style: italic; }
    </style>
</head>
<body>
    <h1>DeForm Render Test</h1>
    
    <div id="status" class="status info">Loading...</div>
    
    <div id="console"></div>
    
    <div class="form-container">
        <de-form id="testForm"></de-form>
    </div>

    <script type="module">
        const statusDiv = document.getElementById('status');
        const consoleDiv = document.getElementById('console');
        const formContainer = document.querySelector('.form-container');
        
        // Capture console output
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToConsole(type, ...args) {
            const timestamp = new Date().toLocaleTimeString();
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            consoleDiv.textContent += `[${timestamp}] ${type.toUpperCase()}: ${message}\n`;
        }
        
        console.log = (...args) => {
            originalLog.apply(console, args);
            addToConsole('log', ...args);
        };
        
        console.error = (...args) => {
            originalError.apply(console, args);
            addToConsole('error', ...args);
        };
        
        console.warn = (...args) => {
            originalWarn.apply(console, args);
            addToConsole('warn', ...args);
        };
        
        // Test the library
        async function testFormRender() {
            try {
                // Import the library
                await import('../src/index.js');
                addToConsole('log', 'Library imported successfully');
                
                // Check if custom element is registered
                if (customElements.get('de-form')) {
                    addToConsole('log', 'Custom element registered');
                    
                    // Wait for the form to be ready
                    const form = document.getElementById('testForm');
                    if (!form) {
                        throw new Error('Form element not found');
                    }
                    
                    // Set up a simple form configuration
                    const simpleFields = {
                        sections: [{
                            name: 'test',
                            fields: [{
                                                            name: 'first',
                            type: 'text',
                            label: 'First name',
                                placeholder: 'Enter your first name',
                                required: true
                            }]
                        }]
                    };
                    
                    // Set the form configuration
                    form.fields = simpleFields;
                    form.values = { first: 'Test' };
                    
                    addToConsole('log', 'Form configuration set');
                    
                    // Wait for the form to render
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    // Check if the form has rendered content
                    const formContent = form.shadowRoot?.innerHTML || '';
                    addToConsole('log', 'Form shadow root content length:', formContent.length);
                    
                    if (formContent.length > 0) {
                        // Look for specific elements
                        const hasInput = formContent.includes('input') || formContent.includes('sl-input');
                        const hasLabel = formContent.includes('First name');
                        
                        if (hasInput && hasLabel) {
                            statusDiv.className = 'status success';
                            statusDiv.textContent = '✅ Form rendered successfully with input field!';
                            addToConsole('log', 'Form rendered with expected elements');
                        } else {
                            statusDiv.className = 'status error';
                            statusDiv.textContent = '❌ Form rendered but missing expected elements';
                            addToConsole('warn', 'Form rendered but missing input or label');
                        }
                    } else {
                        statusDiv.className = 'status error';
                        statusDiv.textContent = '❌ Form not rendering content';
                        addToConsole('error', 'Form shadow root is empty');
                    }
                    
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ Custom element not registered';
                    addToConsole('error', 'de-form custom element not found');
                }
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Test failed: ' + error.message;
                addToConsole('error', 'Test failed:', error);
            }
        }
        
        // Monitor for runtime errors
        window.addEventListener('error', (event) => {
            addToConsole('runtime-error', `${event.message} at ${event.filename}:${event.lineno}`);
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            addToConsole('unhandled-rejection', event.reason);
        });
        
        // Start the test
        testFormRender();
    </script>
</body>
</html>
